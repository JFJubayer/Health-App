name: smart_diet_assistant
description: "A beginner-level but realistic health assistant."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  fl_chart: ^1.2.0
  shared_preferences: ^2.2.2
  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.2
  google_fonts: ^8.1.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.10

flutter:
  uses-material-design: true
