name: smart_diet_assistant
description: "A beginner-level but realistic health assistant."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  fl_chart: ^0.65.0
  shared_preferences: ^2.2.2
  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.2
  google_fonts: ^6.1.0
  animations: ^2.0.11
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2
  flutter_timezone: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
